name: Build Android APK

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master
    tags:
      - '*'
  pull_request:
    branches:
      - main
      - master

permissions:
  contents: read

concurrency:
  group: android-apk-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-oss-debug:
    name: Build OSS debug APKs
    runs-on: ubuntu-latest
    timeout-minutes: 120

    env:
      GRADLE_OPTS: >-
        -Dorg.gradle.daemon=false
        -Dorg.gradle.jvmargs=-Xmx4096M
        -Dfile.encoding=UTF-8
      TERM: dumb

    steps:
      - name: Checkout source
        uses: actions/checkout@v6

      - name: Read project versions
        id: versions
        shell: bash
        run: |
          set -euo pipefail

          read_property() {
            local key="$1"
            local value
            value="$(awk -F= -v key="$key" '$1 == key { print $2; exit }' gradle.properties | tr -d '\r')"
            if [[ -z "$value" ]]; then
              echo "Missing required Gradle property: $key" >&2
              exit 1
            fi
            printf '%s' "$value"
          }

          go_version="$(read_property 'de.felixnuesse.extract.goVersion')"
          ndk_version="$(read_property 'de.felixnuesse.extract.ndkVersion')"
          app_version="$(sed -nE "s/^[[:space:]]*versionName[[:space:]]+['\"]([^'\"]+)['\"].*/\1/p" app/build.gradle | head -n 1)"

          if [[ -z "$app_version" ]]; then
            echo "Unable to read versionName from app/build.gradle" >&2
            exit 1
          fi

          echo "go_version=$go_version" >> "$GITHUB_OUTPUT"
          echo "ndk_version=$ndk_version" >> "$GITHUB_OUTPUT"
          echo "app_version=$app_version" >> "$GITHUB_OUTPUT"

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: ${{ steps.versions.outputs.go_version }}
          check-latest: true
          cache: true
          cache-dependency-path: rclone/rclone-src/go.sum

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v6

      - name: Set up Android SDK
        uses: android-actions/setup-android@v4.0.1

      - name: Install Android SDK packages
        shell: bash
        env:
          NDK_VERSION: ${{ steps.versions.outputs.ndk_version }}
        run: |
          set -euo pipefail
          yes | sdkmanager --licenses >/dev/null || true
          sdkmanager --install \
            'platform-tools' \
            'platforms;android-34' \
            'build-tools;34.0.0' \
            "ndk;${NDK_VERSION}"

      - name: Verify toolchain
        shell: bash
        run: |
          set -euo pipefail
          chmod +x ./gradlew
          java -version
          go version
          ./gradlew --version

      - name: Build OSS debug APKs
        shell: bash
        run: |
          set -euo pipefail
          ./gradlew \
            --no-daemon \
            --stacktrace \
            --warning-mode all \
            assembleOssDebug

      - name: Collect per-architecture APKs and checksums
        id: artifacts
        shell: bash
        env:
          APP_VERSION: ${{ steps.versions.outputs.app_version }}
        run: |
          set -euo pipefail
          shopt -s nullglob

          apks=(app/build/outputs/apk/oss/debug/*.apk)
          if (( ${#apks[@]} == 0 )); then
            echo 'No APK files were generated.' >&2
            exit 1
          fi

          architectures=(armeabi-v7a arm64-v8a x86 x86_64)
          declare -A counts
          for architecture in "${architectures[@]}"; do
            counts["$architecture"]=0
            mkdir -p "artifacts/$architecture"
          done

          for apk in "${apks[@]}"; do
            filename="$(basename "$apk")"
            case "$filename" in
              *armeabi-v7a*) architecture='armeabi-v7a' ;;
              *arm64-v8a*) architecture='arm64-v8a' ;;
              *x86_64*) architecture='x86_64' ;;
              *x86*) architecture='x86' ;;
              *) continue ;; # Do not bundle the universal APK with ABI-specific downloads.
            esac
            cp "$apk" "artifacts/$architecture/"
            counts["$architecture"]=$(( counts["$architecture"] + 1 ))
          done

          for architecture in "${architectures[@]}"; do
            if (( counts["$architecture"] != 1 )); then
              echo "Expected exactly one $architecture APK, found ${counts[$architecture]}." >&2
              exit 1
            fi
            (
              cd "artifacts/$architecture"
              sha256sum ./*.apk > SHA256SUMS.txt
            )
          done

          {
            echo '### Android APK build'
            echo
            echo "- App version: \`${APP_VERSION}\`"
            echo '- Build variant: `ossDebug`'
            echo
            echo '| Architecture | File | Size |'
            echo '|---|---|---:|'
            for architecture in "${architectures[@]}"; do
              apk=("artifacts/$architecture"/*.apk)
              size="$(du -h "${apk[0]}" | cut -f1)"
              echo "| \`$architecture\` | \`$(basename "${apk[0]}")\` | $size |"
            done
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload armeabi-v7a APK
        uses: actions/upload-artifact@v7
        with:
          name: roundsync-${{ steps.versions.outputs.app_version }}-oss-debug-armeabi-v7a-${{ github.run_number }}
          path: artifacts/armeabi-v7a/
          if-no-files-found: error
          retention-days: 30
          compression-level: 0

      - name: Upload arm64-v8a APK
        uses: actions/upload-artifact@v7
        with:
          name: roundsync-${{ steps.versions.outputs.app_version }}-oss-debug-arm64-v8a-${{ github.run_number }}
          path: artifacts/arm64-v8a/
          if-no-files-found: error
          retention-days: 30
          compression-level: 0

      - name: Upload x86 APK
        uses: actions/upload-artifact@v7
        with:
          name: roundsync-${{ steps.versions.outputs.app_version }}-oss-debug-x86-${{ github.run_number }}
          path: artifacts/x86/
          if-no-files-found: error
          retention-days: 30
          compression-level: 0

      - name: Upload x86_64 APK
        uses: actions/upload-artifact@v7
        with:
          name: roundsync-${{ steps.versions.outputs.app_version }}-oss-debug-x86_64-${{ github.run_number }}
          path: artifacts/x86_64/
          if-no-files-found: error
          retention-days: 30
          compression-level: 0

      - name: Upload build reports on failure
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: roundsync-build-reports-${{ github.run_number }}
          path: |
            **/build/reports/**
            **/build/outputs/logs/**
          if-no-files-found: ignore
          retention-days: 7
